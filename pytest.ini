[pytest]
pythonpath =
    backend
testpaths =
    backend/app/tests
    backend/tests/evaluation
    backend/tests/integration
    backend/tests/llm_orchestration
    backend/tests/unit
norecursedirs =
    .git
    .venv
    node_modules
    artifacts
    .codex-artifacts
    backend/.pytest_cache
    backend/.tmp-pytest
filterwarnings =
    ignore:Skipped unsupported reflection of expression-based index ix_llm_assembly_config_active_unique:sqlalchemy.exc.SAWarning
markers =
    golden: SwissEph precision tests with frozen reference values (requires pyswisseph)
    integration: DB/API integration tests excluded from fast local runs
    regression: regression tests (deselect with -m 'not regression')
    slow: DB migration, subprocess, full regression, or quality-gate tests excluded from fast local runs
    evaluation: marks tests as part of the evaluation matrix
    provider_smoke: opt-in provider smoke tests requiring explicit credentials and external LLM calls
