- id: "natal_career_fr"
  tags: ["fr", "career"]
  input:
    question: "Quelle est ma destinée professionnelle ?"
    chart_json: {"sun": {"sign": "Aries", "house": 10}, "moon": {"sign": "Taurus", "house": 2}}
    locale: "fr-FR"
  expected_schema_valid: true
  expected_fields:
    content: { min_length: 100 }

- id: "natal_love_fr"
  tags: ["fr", "love"]
  input:
    question: "Vais-je trouver l'amour cette année ?"
    chart_json: {"venus": {"sign": "Libra", "house": 7}, "mars": {"sign": "Scorpio", "house": 8}}
    locale: "fr-FR"
  expected_schema_valid: true
  expected_fields:
    content: { min_length: 100 }

- id: "natal_health_en"
